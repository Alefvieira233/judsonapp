<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background plate -->
  <rect width="512" height="512" fill="#0A0A0A"/>
  <rect x="40" y="40" width="432" height="432" rx="64" fill="#DC2626"/>

  <!--
    "JL" rendered as paths so Sharp / browsers don't fall back to Arial Narrow
    when Bebas Neue isn't on the system. Geometry is hand-tuned to read as
    a block-condensed sans (Bebas-like) at 192/512 px sizes.
  -->
  <g fill="#FAFAFA">
    <!-- J: top stem + descender + bottom hook -->
    <path d="M 130 132 H 250 V 175 H 215 V 322 Q 215 365 175 365 Q 130 365 118 320 L 158 305 Q 165 330 178 330 Q 188 330 188 320 V 175 H 130 Z"/>

    <!-- L: vertical stem + foot -->
    <path d="M 282 132 H 322 V 322 H 402 V 365 H 282 Z"/>
  </g>
</svg>
